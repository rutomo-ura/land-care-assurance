name: Deploy LandCare web app to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - "scripts/build_landcare_*.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Validate LandCare web app
        shell: bash
        run: |
          test -f docs/monitoring/index.html
          test -f docs/kpi/index.html
          test -f docs/landcare/data/latest_month_summary.json
          test -f docs/landcare/data/latest_month.geojson
          test -f docs/landcare/data/all_months.geojson
          test -f docs/landcare/data/current_universe_summary.json
          test -f docs/landcare/data/current_universe.geojson
          test -f docs/landcare/data/refresh_manifest.json
          python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("docs/landcare/data/latest_month_summary.json").read_text())
          geojson = json.loads(Path("docs/landcare/data/latest_month.geojson").read_text())
          all_months = json.loads(Path("docs/landcare/data/all_months.geojson").read_text())
          current_summary = json.loads(Path("docs/landcare/data/current_universe_summary.json").read_text())
          current_geojson = json.loads(Path("docs/landcare/data/current_universe.geojson").read_text())
          manifest = json.loads(Path("docs/landcare/data/refresh_manifest.json").read_text())

          required_top_level_keys = {
              "latest_month",
              "latest_assignment_period",
              "latest_survey_period",
              "feature_count",
              "ownership_scope",
              "available_months",
              "all_month_feature_count",
              "status_counts",
              "level_counts",
              "ownership_counts",
          }
          missing = sorted(required_top_level_keys - set(summary))
          if missing:
              raise SystemExit(f"latest_month_summary.json missing keys: {missing}")

          features = geojson.get("features") or []
          if not features:
              raise SystemExit("latest_month.geojson has no features")

          all_features = all_months.get("features") or []
          if len(all_features) <= len(features):
              raise SystemExit("all_months.geojson should contain more records than latest_month.geojson")

          if manifest.get("all_month_feature_count") != len(all_features):
              raise SystemExit("refresh_manifest all_month_feature_count does not match all_months.geojson")

          if manifest.get("latest_month_feature_count") != len(features):
              raise SystemExit("refresh_manifest latest_month_feature_count does not match latest_month.geojson")

          if summary["ownership_scope"] != "URA owned only":
              raise SystemExit(f"unexpected ownership scope: {summary['ownership_scope']}")

          if summary["feature_count"] != len(features):
              raise SystemExit(f"summary feature_count {summary['feature_count']} does not match GeoJSON {len(features)}")

          status_counts = summary["status_counts"]
          for key in ("missing", "request_only", "returned"):
              if key not in status_counts:
                  raise SystemExit(f"status_counts missing key: {key}")

          if summary["ownership_counts"].get("URA") != len(features):
              raise SystemExit("ownership_counts URA does not match GeoJSON feature count")

          if summary["all_month_feature_count"] != len(all_features):
              raise SystemExit("summary all_month_feature_count does not match all_months.geojson")

          non_ura = [
              feature.get("properties", {}).get("ownership_type")
              for feature in all_features
              if feature.get("properties", {}).get("ownership_type") != "URA"
          ]
          if non_ura:
              raise SystemExit(f"all_months.geojson includes non-URA ownership values: {sorted(set(non_ura))}")

          current_features = current_geojson.get("features") or []
          if not current_features:
              raise SystemExit("current_universe.geojson has no features")

          if current_summary.get("ownership_scope") != "URA owned only":
              raise SystemExit("current universe is not scoped to URA owned only")

          if current_summary.get("feature_count") != len(current_features):
              raise SystemExit("current_universe_summary feature_count does not match current_universe.geojson")

          current_keys = [
              feature.get("properties", {}).get("parcel_key")
              for feature in current_features
              if feature.get("properties", {}).get("parcel_key")
          ]
          if current_summary.get("unique_parcel_count") != len(set(current_keys)):
              raise SystemExit("current_universe_summary unique_parcel_count does not match GeoJSON parcel keys")

          current_non_ura = [
              feature.get("properties", {}).get("inventory_type")
              for feature in current_features
              if feature.get("properties", {}).get("inventory_type") != "URA Owned"
          ]
          if current_non_ura:
              raise SystemExit(f"current_universe.geojson includes non-URA inventory values: {sorted(set(current_non_ura))}")

          if "current_active" not in current_summary.get("status_counts", {}):
              raise SystemExit("current_universe_summary status_counts missing current_active")
          PY

      - name: Upload docs site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
